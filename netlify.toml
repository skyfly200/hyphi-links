[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  port = 8888
  targetPort = 5173

[functions]
  node_bundler = "esbuild"

[context.production.environment]
  NODE_ENV = "production"

# Admin UI
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# API routes — must come before /:code catch-all
[[redirects]]
  from = "/api/links"
  to = "/.netlify/functions/links-api"
  status = 200

[[redirects]]
  from = "/api/links/*"
  to = "/.netlify/functions/links-api?path=:splat"
  status = 200

# Short code catch-all — pass code as query param
[[redirects]]
  from = "/:code"
  to = "/.netlify/functions/redirect?code=:code"
  status = 200
  force = true