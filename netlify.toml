[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  port = 8888
  targetPort = 5173

# All short link requests → redirect function
[[redirects]]
  from = "/:code"
  to = "/.netlify/functions/redirect/:code"
  status = 200
  force = true
  conditions = {Role = ["admin"]}

# Exclude admin UI routes from the redirect rule
[[redirects]]
  from = "/admin"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/index.html"
  status = 200

# All short codes → redirect function (must come after admin exclusions)
[[redirects]]
  from = "/:code"
  to = "/.netlify/functions/redirect"
  status = 200
  force = true

[functions]
  node_bundler = "esbuild"

[context.production.environment]
  NODE_ENV = "production"
