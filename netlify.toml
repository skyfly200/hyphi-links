[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  port = 8888
  targetPort = 5173

[functions]
  node_bundler = "esbuild"

[context.production.environment]
  NODE_ENV = "production"

# Admin UI — must come before the catch-all
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# API routes → links-api function
[[redirects]]
  from = "/api/links"
  to = "/.netlify/functions/links-api"
  status = 200
  force = true

[[redirects]]
  from = "/api/links/*"
  to = "/.netlify/functions/links-api"
  status = 200
  force = true

# Short code catch-all → redirect function
# Must be last so admin and api routes take priority
[[redirects]]
  from = "/:code"
  to = "/.netlify/functions/redirect"
  status = 200
  force = true