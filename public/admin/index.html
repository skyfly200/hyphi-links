<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>l.hyphi.art — admin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#080810;--s:#0f0f1a;--s2:#161625;--bd:#1c1c2e;--t:#ddddf0;--mu:#55556a;--ac:#b48eff;--acd:rgba(180,142,255,.1);--rd:#ff4f6b;--gr:#4ade80}
    body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;font-size:14px}
    .shell{max-width:860px;margin:0 auto;padding:32px 20px}
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
    .logo{font-size:1.4rem;font-weight:800;letter-spacing:-.02em}
    .logo em{color:var(--ac);font-style:normal}
    .auth-wrap{display:flex;gap:8px}
    input[type=password],input[type=text],input[type=url]{padding:8px 11px;background:var(--s);border:1px solid var(--bd);border-radius:8px;color:var(--t);font-family:inherit;font-size:.83rem;outline:none;transition:.15s;width:100%}
    input:focus{border-color:var(--ac);box-shadow:0 0 0 2px var(--acd)}
    button{padding:8px 16px;border-radius:8px;border:none;font-family:inherit;font-size:.83rem;font-weight:700;cursor:pointer;transition:.15s}
    .btn-primary{background:var(--ac);color:#000}
    .btn-primary:hover{background:#c9a8ff}
    .btn-ghost{background:var(--s);color:var(--mu);border:1px solid var(--bd)}
    .btn-ghost:hover{color:var(--t);border-color:#333352}
    .btn-danger{background:none;color:var(--rd);border:1px solid var(--bd);padding:4px 10px;font-size:.75rem}
    .btn-danger:hover{border-color:var(--rd)}
    .card{background:var(--s);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:12px}
    .create-form{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:end;margin-bottom:28px}
    .create-form .field{display:flex;flex-direction:column;gap:5px}
    .lbl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mu)}
    .link-row{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--bd)}
    .link-row:last-child{border-bottom:none}
    .link-code{font-family:'DM Mono',monospace;font-size:.9rem;color:var(--ac);font-weight:600}
    .link-dest{font-size:.78rem;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:320px}
    .link-meta{font-size:.68rem;color:var(--mu);margin-top:2px}
    .short-url{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--t);background:var(--s2);padding:3px 8px;border-radius:5px;text-decoration:none;border:1px solid var(--bd)}
    .short-url:hover{border-color:var(--ac);color:var(--ac)}
    .clicks-badge{font-family:'DM Mono',monospace;font-size:.75rem;background:var(--acd);color:var(--ac);border:1px solid var(--bd);border-radius:20px;padding:3px 10px;white-space:nowrap}
    .empty{text-align:center;color:var(--mu);padding:40px 0;font-size:.85rem}
    .notice{padding:10px 14px;border-radius:8px;font-size:.78rem;margin-bottom:16px;border-left:3px solid}
    .notice.error{background:rgba(255,79,107,.08);border-color:var(--rd);color:#ff8fa3}
    .notice.success{background:rgba(74,222,128,.08);border-color:var(--gr);color:#86efac}
    .section-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin-bottom:14px}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}
    .stat-box{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;text-align:center}
    .stat-val{font-family:'DM Mono',monospace;font-size:1.1rem;color:var(--ac);font-weight:600}
    .stat-lbl{font-size:.6rem;color:var(--mu);margin-top:2px}
    #auth-section{max-width:340px;margin:80px auto;text-align:center}
    #auth-section h2{font-size:1.2rem;margin-bottom:20px;color:var(--t)}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:600px){.create-form{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>

<!-- Auth gate -->
<div id="auth-section" style="display:none">
  <div class="logo" style="margin-bottom:24px">l.<em>hyphi</em>.art</div>
  <h2>Admin</h2>
  <div style="display:flex;gap:8px">
    <input type="password" id="secret-input" placeholder="Admin secret" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn-primary" onclick="login()">Enter</button>
  </div>
  <div id="auth-error" style="color:var(--rd);font-size:.78rem;margin-top:10px"></div>
</div>

<!-- Main app -->
<div class="shell" id="app" style="display:none">
  <header>
    <div class="logo">l.<em>hyphi</em>.art <span style="font-size:.7rem;color:var(--mu);font-weight:400">admin</span></div>
    <button class="btn-ghost" onclick="logout()" style="font-size:.75rem">Sign out</button>
  </header>

  <div id="notice" style="display:none"></div>

  <!-- Create link -->
  <div class="card">
    <div class="section-title">Create short link</div>
    <div class="create-form">
      <div class="field" style="grid-column:1/-1">
        <label class="lbl">Destination URL</label>
        <input type="url" id="dest-input" placeholder="https://hyphi.art/some/page"/>
      </div>
      <div class="field">
        <label class="lbl">Custom code (optional)</label>
        <input type="text" id="code-input" placeholder="auto-generated" style="font-family:'DM Mono',monospace"/>
      </div>
      <div class="field">
        <label class="lbl">Label (optional)</label>
        <input type="text" id="label-input" placeholder="e.g. QRForge launch"/>
      </div>
      <button class="btn-primary" onclick="createLink()" style="align-self:flex-end">Create</button>
    </div>
  </div>

  <!-- Links list -->
  <div class="card">
    <div class="section-title" style="display:flex;align-items:center;justify-content:space-between">
      <span>Links</span>
      <button class="btn-ghost" onclick="loadLinks()" style="font-size:.72rem;padding:4px 10px">↻ Refresh</button>
    </div>
    <div id="links-list"><div class="empty"><span class="spinner"></span> Loading…</div></div>
  </div>

  <!-- Stats panel (shown on row click) -->
  <div class="card" id="stats-panel" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="section-title" id="stats-title">Click stats</div>
      <button class="btn-ghost" onclick="document.getElementById('stats-panel').style.display='none'" style="font-size:.72rem;padding:4px 10px">✕ Close</button>
    </div>
    <div id="stats-content"></div>
  </div>
</div>

<script>
const BASE = ''  // same origin
let SECRET = ''

// ── Auth ──────────────────────────────────────────────────────────────────────
function login() {
  const val = document.getElementById('secret-input').value.trim()
  if (!val) return
  SECRET = val
  localStorage.setItem('hyphi_admin_secret', SECRET)
  showApp()
}

function logout() {
  SECRET = ''
  localStorage.removeItem('hyphi_admin_secret')
  document.getElementById('app').style.display = 'none'
  document.getElementById('auth-section').style.display = 'block'
  document.getElementById('secret-input').value = ''
}

function showApp() {
  document.getElementById('auth-section').style.display = 'none'
  document.getElementById('app').style.display = 'block'
  loadLinks()
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(path, options = {}) {
  let res
  try {
    res = await fetch(`/api/links${path}`, {
      ...options,
      headers: {
        'Authorization': `Bearer ${SECRET}`,
        'Content-Type': 'application/json',
        ...options.headers,
      }
    })
  } catch(e) {
    return { error: `Network error: ${e.message}` }
  }
  if (res.status === 401) { logout(); return null }
  try {
    return await res.json()
  } catch(e) {
    return { error: `Server error (${res.status})` }
  }
}

// ── Notice ────────────────────────────────────────────────────────────────────
function showNotice(msg, type = 'success') {
  const el = document.getElementById('notice')
  el.className = `notice ${type}`
  el.textContent = msg
  el.style.display = 'block'
  setTimeout(() => { el.style.display = 'none' }, 3500)
}

// ── Create link ───────────────────────────────────────────────────────────────
async function createLink() {
  const destination = document.getElementById('dest-input').value.trim()
  const code        = document.getElementById('code-input').value.trim()
  const label       = document.getElementById('label-input').value.trim()
  if (!destination) return showNotice('Destination URL is required', 'error')

  const data = await api('', {
    method: 'POST',
    body: JSON.stringify({ destination, code: code || undefined, label: label || undefined })
  })
  if (!data) return
  if (data.error) return showNotice(data.error, 'error')

  document.getElementById('dest-input').value  = ''
  document.getElementById('code-input').value  = ''
  document.getElementById('label-input').value = ''
  showNotice(`Created: ${data.short_url}`)
  loadLinks()
}

// ── Load links ────────────────────────────────────────────────────────────────
async function loadLinks() {
  const data = await api('')
  const el   = document.getElementById('links-list')
  if (!data) return
  if (data.error) {
    el.innerHTML = `<div class="empty" style="color:var(--rd)">${data.error}</div>`
    return
  }
  if (!data.links?.length) {
    el.innerHTML = '<div class="empty">No links yet. Create one above.</div>'
    return
  }
  el.innerHTML = data.links.map(l => `
    <div class="link-row">
      <div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="link-code">${l.code}</span>
          <a href="https://l.hyphi.art/${l.code}" class="short-url" target="_blank">l.hyphi.art/${l.code}</a>
          ${l.label ? `<span style="font-size:.7rem;color:var(--mu);background:var(--s2);padding:2px 7px;border-radius:10px;border:1px solid var(--bd)">${l.label}</span>` : ''}
        </div>
        <div class="link-dest" title="${l.destination}">${l.destination}</div>
        <div class="link-meta">${new Date(l.created_at).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'})}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="clicks-badge" style="cursor:pointer" onclick="loadStats('${l.code}', '${(l.label||l.code).replace(/'/g,"\\'")}')">
          ${l.click_count ?? '—'} clicks
        </span>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn-ghost" onclick="copyLink('https://l.hyphi.art/${l.code}')" style="font-size:.72rem;padding:4px 10px">Copy</button>
        <button class="btn-danger" onclick="deleteLink('${l.code}')">Delete</button>
      </div>
    </div>
  `).join('')
}

// ── Copy ──────────────────────────────────────────────────────────────────────
function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => showNotice(`Copied: ${url}`))
}

// ── Delete ────────────────────────────────────────────────────────────────────
async function deleteLink(code) {
  if (!confirm(`Delete /${code}? This cannot be undone.`)) return
  await api(`/${code}`, { method: 'DELETE' })
  showNotice(`Deleted: /${code}`)
  loadLinks()
}

// ── Stats ─────────────────────────────────────────────────────────────────────
async function loadStats(code, label) {
  const panel = document.getElementById('stats-panel')
  const title = document.getElementById('stats-title')
  const content = document.getElementById('stats-content')
  title.textContent = `Stats — /${code}${label !== code ? ` (${label})` : ''}`
  content.innerHTML = '<span class="spinner"></span> Loading…'
  panel.style.display = 'block'
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' })

  const data = await api(`/${code}/stats`)
  if (!data || data.error) {
    content.innerHTML = `<div style="color:var(--mu);font-size:.82rem">${data?.error || 'Stats unavailable — Supabase not configured.'}</div>`
    return
  }

  const topReferrers = (data.by_referrer || []).slice(0, 5)
  const topCountries = (data.by_country  || []).slice(0, 5)

  content.innerHTML = `
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val">${data.total_clicks ?? 0}</div><div class="stat-lbl">Total clicks</div></div>
      <div class="stat-box"><div class="stat-val">${(data.by_day||[]).filter(c=>new Date(c.clicked_at)>new Date(Date.now()-86400000)).length}</div><div class="stat-lbl">Last 24h</div></div>
      <div class="stat-box"><div class="stat-val">${(data.by_day||[]).filter(c=>new Date(c.clicked_at)>new Date(Date.now()-604800000)).length}</div><div class="stat-lbl">Last 7 days</div></div>
      <div class="stat-box"><div class="stat-val">${topCountries.length}</div><div class="stat-lbl">Countries</div></div>
    </div>
    ${topReferrers.length ? `
    <div style="margin-top:16px">
      <div class="section-title">Top referrers</div>
      ${topReferrers.map(r=>`
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);font-size:.78rem">
          <span style="color:var(--mu)">${r.referrer || '(direct)'}</span>
          <span class="mono" style="color:var(--ac)">${r.count}</span>
        </div>`).join('')}
    </div>` : ''}
    ${topCountries.length ? `
    <div style="margin-top:16px">
      <div class="section-title">Top countries</div>
      ${topCountries.map(c=>`
        <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);font-size:.78rem">
          <span style="color:var(--mu)">${c.country || '(unknown)'}</span>
          <span class="mono" style="color:var(--ac)">${c.count}</span>
        </div>`).join('')}
    </div>` : ''}
  `
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const stored = localStorage.getItem('hyphi_admin_secret')
  if (stored) { SECRET = stored; showApp() }
  else document.getElementById('auth-section').style.display = 'block'
})
</script>
</body>
</html>
